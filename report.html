<!doctype html>
<html lang="en">

  <!--[if lt IE 9]>
<script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
<![endif]-->
  <link href="https://cdn.anychart.com/releases/v8/css/anychart-ui.min.css" rel="stylesheet" type="text/css">
  <link href="https://cdn.anychart.com/playground-css/parse-html-table/style.css" rel="stylesheet" type="text/css">
  <style>html, body, #container {
    width: 100%;

    margin: 0;

}</style>
 </head>
 <body>
  <div id="container"></div>

  <script src="https://cdn.anychart.com/releases/v8/js/anychart-base.min.js"></script>
  <script src="https://cdn.anychart.com/releases/v8/js/anychart-exports.min.js"></script>
  <script src="https://cdn.anychart.com/releases/v8/js/anychart-ui.min.js"></script>
  <script src="https://cdn.anychart.com/releases/v8/js/anychart-data-adapter.min.js"></script>
  <script type="text/javascript">anychart.onDocumentReady(function () {
    // To work with the data adapter you need to reference the data adapter script file from AnyChart CDN
    // (https://cdn.anychart.com/releases/v8/js/anychart-data-adapter.min.js for latest or https://cdn.anychart.com/releases/v8/js/anychart-data-adapter.min.js for the versioned file)

    // Parses HTML table.
    var tableData = anychart.data.parseHtmlTable('#html-table');

    var chart = anychart.bar();
    chart.margin([0, '45%', 0, 0]);

    // Set data from HTML table.
    chart.data(tableData);

    chart.title('Digital Certificates by Divisions');
    chart.container('container');
    chart.draw();
});</script>
 </body>
</html>
