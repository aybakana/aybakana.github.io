<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <title>BCT Series Type 01</title>
  <link href="https://playground.anychart.com/docs/samples/BCT_Series_Type_01/iframe" rel="canonical">
  <meta content="Area Chart" name="keywords">
  <meta content="AnyChart - JavaScript Charts designed to be embedded and integrated" name="description">
  <!--[if lt IE 9]>
<script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
<![endif]-->
  <style>html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}
select {
    margin: 10px 0 0 10px;
}
#container {
    position: absolute;
    width: 100%;
    top: 35px;
    bottom: 0;
}</style>
 </head>
 <body>
  <select id="typeSelect" onchange="switchType()"> <option value="area">Area</option> <option value="column">Column</option> <option value="jump-line">Jump Line</option> <option value="line">Line</option> <option value="marker">Marker</option> <option value="spline-area">Spline Area</option> <option value="spline">Spline</option> <option value="step-area">Step Area</option> <option value="step-line">Step Line</option> <option value="stick">Stick</option> </select> 
  <div id="container"></div>
  <script src="https://cdn.anychart.com/releases/8.11.0/js/anychart-base.min.js?hcode=a0c21fc77e1449cc86299c5faa067dc4"></script>
  <script src="https://cdn.anychart.com/releases/8.11.0/js/anychart-exports.min.js?hcode=a0c21fc77e1449cc86299c5faa067dc4"></script>
  <script src="https://cdn.anychart.com/releases/8.11.0/js/anychart-ui.min.js?hcode=a0c21fc77e1449cc86299c5faa067dc4"></script>
  <script type="text/javascript">anychart.onDocumentReady(function () {

    // create data
    var data = [
      ["Spring", 10],
      ["Summer", 15],
      ["Autumn", 8],
      ["Winter", 23]
    ];

    // set the chart type
    var chart = anychart.area();

    // set the series type and data
    series = chart.area(data);

    // set the chart title
    chart.title("Switching the Series Type");

    // set the container id
    chart.container("container");

    // initiate drawing the chart
    chart.draw();
});

// switch the series type
function switchType() {
  var select = document.getElementById("typeSelect");
  series.seriesType(select.value);
}</script>
 </body>
</html>
