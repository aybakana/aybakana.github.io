<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <title>WD Data from CSV 02</title>
  <link href="https://playground.anychart.com/docs/samples/WD_Data_from_CSV_02/iframe" rel="canonical">
  <meta content="Line Chart" name="keywords">
  <meta content="AnyChart - JavaScript Charts designed to be embedded and integrated" name="description">
  <!--[if lt IE 9]>
<script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
<![endif]-->
  <link href="https://cdn.anychart.com/releases/8.11.0/css/anychart-ui.min.css?hcode=a0c21fc77e1449cc86299c5faa067dc4" rel="stylesheet" type="text/css">
  <style>html, body, #container {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}</style>
 </head>
 <body>
  <div id="container"></div>
  <script src="https://cdn.anychart.com/releases/8.11.0/js/anychart-base.min.js?hcode=a0c21fc77e1449cc86299c5faa067dc4"></script>
  <script src="https://cdn.anychart.com/releases/8.11.0/js/anychart-exports.min.js?hcode=a0c21fc77e1449cc86299c5faa067dc4"></script>
  <script src="https://cdn.anychart.com/releases/8.11.0/js/anychart-ui.min.js?hcode=a0c21fc77e1449cc86299c5faa067dc4"></script>
  <script type="text/javascript">anychart.onDocumentReady(function () {
  
  // create CSV string
  var csvString = 'Dates;Price*' +
    '2009-02-05;6764.81*' +
    '2009-02-07;7056.48*' +
    '2009-02-18;7180.97*' +
    '2009-02-26;7269.06*' +
    '2009-02-25;7349.58*' +
    '2009-02-24;7115.34*' +
    '2009-02-23;7365.99*' +
    '2009-02-20;7461.49*' +
    '2009-02-19;7555.23';

  // create an area chart      
  var chart = anychart.line();

  // create the area series based on CSV data
  chart.line(csvString, {ignoreFirstRow: true, columnsSeparator: ";", rowsSeparator: "*"});

  // display a chart
  chart.container('container').draw();
});</script>
 </body>
</html>
